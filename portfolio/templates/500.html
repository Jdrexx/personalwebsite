{% extends 'portfolio/base.html' %}
{% block title %}Server Error | {{ content.name }}{% endblock %}
{% block content %}
<section class="page-hero section-shell" style="text-align:center; min-height:50vh; display:flex; flex-direction:column; justify-content:center;">
  <p class="eyebrow">500</p>
  <h1>Something went wrong</h1>
  <p class="lead" style="max-width:520px; margin-inline:auto;">An unexpected error occurred. If this keeps happening, feel free to reach out.</p>
  <div class="hero-actions" style="justify-content:center;">
    <a class="button primary" href="/">Go Home</a>
    <a class="button secondary" href="mailto:{{ content.email }}">Contact Me</a>
  </div>
</section>
{% endblock %}
