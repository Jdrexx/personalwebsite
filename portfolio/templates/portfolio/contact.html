{% extends 'portfolio/base.html' %}
{% block title %}Contact | {{ content.name }}{% endblock %}
{% block content %}
<section class="page-hero section-shell fade-in">
  <p class="eyebrow">Get in touch</p>
  <h1>Contact</h1>
  <p class="lead">Have a project, question, or opportunity? Send me a message.</p>
</section>

<section class="section-shell fade-in">
  <form class="contact-form" action="https://formspree.io/f/xlgyvpar" method="post">
  <input type="hidden" name="_next" value="https://jdreksler.com/thanks/">
  <input type="hidden" name="_subject" value="Website contact form">
  <input type="text" name="_gotcha" class="honeypot" tabindex="-1" autocomplete="off">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="Your name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="_replyto" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" required placeholder="What would you like to discuss?"></textarea>
    </div>
    <button class="button primary" type="submit">Send message</button>
  </form>
</section>
{% endblock %}
