{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="{% static 'portfolio/favicon.svg' %}">
  <link rel="alternate icon" href="{% static 'portfolio/favicon.svg' %}">
  <title>{% block title %}{{ content.name }}{% endblock %}</title>
  <meta name="description" content="Personal website for {{ content.name }} — AI automation, systems, project management, and operations portfolio.">
  <meta property="og:title" content="{{ content.name }} | Technical Project Manager">
  <meta property="og:description" content="{{ content.tagline }}">
  <meta property="og:url" content="https://jdreksler.com">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://jdreksler.com/static/portfolio/featured-work.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ content.name }} | Technical Project Manager">
  <meta name="twitter:description" content="{{ content.tagline }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'portfolio/css/site.css' %}?v=3">
</head>
<body>
  <div class="page-glow"></div>
  <header class="site-header">
    <a class="brand" href="/" aria-label="{{ content.name }} home">
      <span class="brand-mark">JD</span>
      <span class="brand-name">{{ content.name }}</span>
    </a>
    <div class="nav-actions">
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark/light mode">🌙</button>
      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
      <label for="nav-toggle" class="nav-hamburger" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </label>
    <nav class="nav" aria-label="Main navigation">
      <a class="{% if active == 'home' %}active{% endif %}" href="{% url 'portfolio:home' %}">Home</a>
      <a class="{% if active == 'projects' %}active{% endif %}" href="{% url 'portfolio:projects' %}">Projects</a>
      <a class="{% if active == 'resume' %}active{% endif %}" href="{% url 'portfolio:resume' %}">Resume</a>
      <a class="{% if active == 'contact' %}active{% endif %}" href="{% url 'portfolio:contact' %}">Contact</a>
      <span class="nav-divider" aria-hidden="true"></span>
      <a class="nav-icon" href="https://github.com/Jdrexx" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
        <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <a class="nav-icon" href="https://linkedin.com/in/jdrexx" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div>
      <strong>{{ content.name }}</strong>
      <p>{{ content.location }} · {{ content.email }}</p>
    </div>
    <div class="footer-links">
      <a class="footer-link" href="{{ content.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a class="footer-link" href="https://linkedin.com/in/jdrexx" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <span class="footer-credit">Built with Django</span>
    </div>
  </footer>
  <button id="back-to-top" aria-label="Back to top">↑</button>
{% block scripts %}
<script>
// Theme toggle
(function(){
  var btn = document.getElementById('theme-toggle');
  var html = document.documentElement;
  var stored = localStorage.getItem('theme');
  if (stored === 'light') { html.setAttribute('data-theme', 'light'); if (btn) btn.textContent = '☀️'; }
  if (!btn) return;
  btn.addEventListener('click', function() {
    var isLight = html.getAttribute('data-theme') === 'light';
    html.setAttribute('data-theme', isLight ? '' : 'light');
    btn.textContent = isLight ? '🌙' : '☀️';
    localStorage.setItem('theme', isLight ? '' : 'light');
  });
})();

// Structured data
var ld = document.createElement('script');
ld.type = 'application/ld+json';
ld.textContent = JSON.stringify({
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ content.name|escapejs }}",
  "jobTitle": "Technical Project Manager",
  "email": "{{ content.email|escapejs }}",
  "url": "https://jdreksler.com",
  "sameAs": ["https://github.com/Jdrexx", "https://linkedin.com/in/jdrexx"],
  "knowsAbout": ["AI Automation", "Project Management", "Python", "Django", "API Integration", "Systems Integration"]
});
document.head.appendChild(ld);

// Scroll animations
(function(){
  var els = document.querySelectorAll('.fade-in');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.15 });
  els.forEach(function(el) { obs.observe(el); });
})();

// Back-to-top
(function(){
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  window.addEventListener('scroll', function() {
    btn.classList.toggle('visible', window.scrollY > 300);
  });
  btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
})();
</script>
{% endblock %}
</body>
</html>
