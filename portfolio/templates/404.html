{% extends 'portfolio/base.html' %}
{% block title %}Page Not Found | {{ content.name }}{% endblock %}
{% block content %}
<section class="page-hero section-shell" style="text-align:center; min-height:50vh; display:flex; flex-direction:column; justify-content:center;">
  <p class="eyebrow">404</p>
  <h1>Page not found</h1>
  <p class="lead" style="max-width:520px; margin-inline:auto;">The page you're looking for doesn't exist or has moved. Let's get you back somewhere useful.</p>
  <div class="hero-actions" style="justify-content:center;">
    <a class="button primary" href="/">Go Home</a>
    <a class="button secondary" href="/projects/">View Projects</a>
  </div>
</section>
{% endblock %}
